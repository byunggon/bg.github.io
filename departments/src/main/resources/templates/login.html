<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>직원 로그인</title>
    <style>
        /* 기본 스타일 초기화 */
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h2 {
            color: #1a1a1a;
            margin-bottom: 24px;
            font-size: 24px;
        }

        .error-msg {
            background-color: #fff1f0;
            color: #ff4d4f;
            border: 1px solid #ffccc7;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            box-sizing: border-box; /* 패딩 포함 크기 조절 */
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: #1890ff;
            outline: none;
            box-shadow: 0 0 0 2px rgba(24, 144, 255, 0.2);
        }

        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button, .home-btn {
            flex: 1;
            padding: 12px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            text-decoration: none;
            transition: opacity 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-btn {
            background-color: #1890ff;
            color: white;
            font-weight: bold;
        }

        .home-btn {
            background-color: #f5f5f5;
            color: #595959;
            border: 1px solid #d9d9d9;
        }

        button:hover, .home-btn:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>
<div class="login-container">
    <h2>직원 로그인</h2>

    <form th:action="@{/login}" method="post">
        <div class="error-msg" th:if="${param.error}">
            존재하지 않는 직원 이름입니다.
        </div>

        <div class="input-group">
            <input type="text" name="dept"
                   placeholder="부서를 입력하세요" required autofocus>
            <input type="text" name="name"
                   placeholder="성함을 입력하세요" required>
        </div>

        <div class="btn-group">
            <button type="submit" class="login-btn">접속하기</button>
            <a th:href="@{/}" class="home-btn">홈으로</a>
        </div>
    </form>
</div>
</body>
</html>
