<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <th:block th:replace="~{common/fragments :: headerFragment}"></th:block>

    <title>사용자 관리</title>

    <style>
        /* [3] 화면 흔들림 및 네비바 고정 강력 교정 */
        html {
            overflow-y: scroll !important; /* 스크롤바 항상 표시하여 너비 변화 방지 */
        }

        body {
            padding-top: 100px !important;
            padding-right: 0 !important; /* 모달 오픈 시 밀림 방지 핵심 */
            font-family: 'Pretendard', sans-serif;
            background-color: #f8f9fa;
            margin: 0;
        }

        /* 모달이 뜰 때 Bootstrap이 body에 강제로 넣는 패딩 제거 */
        body.modal-open {
            padding-right: 0 !important;
        }

        .navbar {
            display: flex !important;
            flex-direction: row !important;
            flex-wrap: nowrap !important;
            align-items: center !important;
            justify-content: space-between !important;
            padding: 0 2rem !important;
            background-color: white !important;
            height: 70px !important;
            box-sizing: border-box !important;
        }

        /* [4] 컨테이너 및 테이블 디자인 */
        .container {
            max-width: 1100px;
            margin: 0 auto 40px auto;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        .dept-label {
            display: inline-block;
            color: #4361ee;
            font-weight: 600;
            background-color: #f0f4ff;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.85rem;
        }

        .emp-name {
            font-weight: 500;
            color: #333;
            cursor: pointer;
            transition: color 0.2s;
        }
        .emp-name:hover { color: #4361ee; text-decoration: underline; }

        .path-badge {
            font-size: 0.85rem;
            color: #888;
            background: #f8f9fa;
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid #eee;
        }

        .search-container {
            background: #ffffff;
            padding: 15px 0;
            margin-bottom: 20px;
        }

        tbody tr:hover { background-color: #fafbff; }

        /* 모달 위치 조정 */
        .modal-dialog-centered {
            display: flex;
            align-items: center;
            min-height: calc(100% - 1rem);
        }
    </style>
</head>
<body>

<nav th:replace="~{common/fragments :: navFragment}"></nav>

<div class="container">
    <div class="header d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom">
        <h2 class="m-0" style="font-size: 1.6rem; font-weight: 700;">
            <i class="fa-solid fa-users-gear me-2 text-primary"></i>사용자 관리
        </h2>
        <button type="button" class="btn btn-primary btn-lg fs-6 shadow-sm" onclick="openRegModal()">
            <i class="fa-solid fa-user-plus me-1"></i> 직원 등록
        </button>
    </div>

    <div class="search-container">
        <div class="row">
            <div class="col-md-5">
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-magnifying-glass text-muted"></i></span>
                    <input type="text" id="orgSearchInput" class="form-control border-start-0 bg-light" placeholder="부서명 또는 직원 이름 검색">
                </div>
            </div>
        </div>
    </div>

    <div id="orgTableArea" class="table-wrapper">
        <table class="table">
            <thead>
            <tr>
                <th style="width: 25%;">부서명</th>
                <th style="width: 20%;">구성원</th>
                <th style="width: 55%;">상세 경로</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${userList}" class="user-row">
                <td><span class="dept-label" th:text="${item.deptName}">부서명</span></td>
                <td>
                    <div th:if="${item.empName != null}" class="emp-name"
                         th:onclick="openUpdateModal([[${item.empId}]], [[${item.empName}]])">
                        <i class="fa-solid fa-circle-user me-2 text-primary opacity-75"></i>
                        <span th:text="${item.empName}">이름</span>
                    </div>
                    <span th:if="${item.empName == null}" class="text-muted small italic">미배정</span>
                </td>
                <td>
                        <span class="path-badge">
                            <i class="fa-solid fa-location-arrow me-1 opacity-50"></i>
                            <span th:text="${item.fullPath}">경로</span>
                        </span>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(userList)}">
                <td colspan="3" class="text-center py-5 text-muted">등록된 사용자가 없습니다.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<div class="modal fade" id="regModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold">신규 직원 등록</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="regForm">
                    <div class="mb-3">
                        <label class="form-label">부서 선택</label>
                        <select name="deptId" class="form-select shadow-sm">
                            <option value="">-- 부서 선택 --</option>
                            <option th:each="dept : ${deptList}" th:value="${dept.deptId}" th:text="${dept.deptName}"></option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">이름</label>
                        <input type="text" name="empName" class="form-control shadow-sm" placeholder="성함을 입력하세요">
                    </div>
                </form>
            </div>
            <div class="modal-footer border-0">
                <button type="button" class="btn btn-primary w-100 py-2 shadow-sm" onclick="saveEmployee()">등록하기</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="updateModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold">직원 정보 관리</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="updateForm">
                    <input type="hidden" name="empId" id="updEmpId">
                    <div class="mb-3">
                        <label class="form-label">이름</label>
                        <input type="text" id="updEmpName" class="form-control bg-light" readonly>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-primary fw-bold">이동할 부서 선택</label>
                        <select name="deptId" id="updDeptId" class="form-select border-primary shadow-sm">
                            <option value="">-- 부서 선택 --</option>
                            <option th:each="dept : ${deptList}" th:value="${dept.deptId}" th:text="${dept.deptName}"></option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-0">
                <button type="button" class="btn btn-warning px-4" onclick="updateEmployee()">수정</button>
                <button type="button" class="btn btn-danger px-4" onclick="deleteEmployee()">삭제</button>
                <button type="button" class="btn btn-secondary px-4" data-bs-dismiss="modal">닫기</button>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script th:inline="javascript">
    var regModal, updateModal;
    $(document).ready(function() {
        regModal = new bootstrap.Modal(document.getElementById('regModal'));
        updateModal = new bootstrap.Modal(document.getElementById('updateModal'));

        $("#orgSearchInput").on("keyup", function() {
            var value = $(this).val().toLowerCase();
            $("#orgTableArea tbody tr").filter(function() {
                $(this).toggle($(this).text().toLowerCase().indexOf(value) > -1);
            });
        });
    });

    function openRegModal() { $('#regForm')[0].reset(); regModal.show(); }
    function openUpdateModal(id, name) {
        $('#updEmpId').val(id); $('#updEmpName').val(name); $('#updDeptId').val(""); updateModal.show();
    }
    function saveEmployee() {
        if(!$('select[name=deptId]').val() || !$('input[name=empName]').val()) return alert("부서와 이름을 모두 입력하세요.");
        $.post('/org/register', $('#regForm').serialize(), function() { alert("등록되었습니다."); location.reload(); });
    }
    function updateEmployee() {
        if(!$('#updDeptId').val()) return alert("변경할 부서를 선택하세요.");
        $.post('/org/update', $('#updateForm').serialize(), function() { alert("수정되었습니다."); location.reload(); });
    }
    function deleteEmployee() {
        if(!confirm("정말 삭제하시겠습니까?")) return;
        $.post('/org/delete', { empId: $('#updEmpId').val() }, function() { alert("삭제되었습니다."); location.reload(); });
    }
</script>
</body>
</html>
