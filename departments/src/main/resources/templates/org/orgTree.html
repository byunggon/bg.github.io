<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{common/fragments :: headerFragment}"></th:block>
    <title>조직도 트리</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jstree/3.3.12/themes/default/style.min.css" />

    <style>

        /* [1] 전체 레이아웃 초기화 (index.html과 동일) */
        html, body {
            margin: 0 !important;
            padding: 0 !important;
            width: 100% !important;
            overflow-x: hidden;
            background-color: #f8f9fa;
            font-family: 'Pretendard', sans-serif;
        }

        /* [2] Navbar 위치 강제 고정 (orgList와 동일) */
        nav.navbar {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            right: 0 !important;
            width: 100% !important;
            padding: 0 2rem !important;
            box-sizing: border-box !important;
            z-index: 2000 !important;
        }

        /* [3] 본문 컨테이너 (index.html 설정값 1000px) */
        .container {
            max-width: 1000px !important;
            margin: 100px auto 40px auto !important;
            padding: 0 20px !important;
            box-sizing: border-box !important;
        }

        /* [4] 트리 전용 카드 디자인 */
        .tree-card {
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
        }

        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #f8f9fa;
            padding-bottom: 20px;
        }

        /* 검색 및 컨트롤러 영역 */
        .control-panel {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: #f1f3f5;
            padding: 15px;
            border-radius: 12px;
        }

        #search {
            flex: 1;
            padding: 8px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .tree-btn {
            padding: 8px 15px;
            border: 1px solid #dee2e6;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        .tree-btn:hover { background: #e9ecef; }

        .tree-container {
            border: 1px solid #f1f3f5;
            padding: 20px;
            border-radius: 12px;
            min-height: 500px;
            background: #ffffff;
        }

        /* jsTree 폰트 크기 조정 */
        .jstree-default .jstree-anchor { font-size: 1rem !important; }
    </style>
</head>
<body>

<nav th:replace="~{common/fragments :: navFragment}"></nav>

<div class="container">
    <div class="tree-card">
        <div class="header-area">
            <h2 style="margin: 0; font-size: 1.8rem; font-weight: 800; display: flex; align-items: center; gap: 12px;">
                <i class="fa-solid fa-sitemap" style="color: #4361ee;"></i> 트리 조직도
            </h2>
        </div>

        <div class="control-panel">
            <input type="text" id="search" placeholder="부서 또는 이름을 검색하세요..." />
            <button id="btn-open" class="tree-btn" title="모두 펼치기"><i class="fa-solid fa-plus"></i></button>
            <button id="btn-close" class="tree-btn" title="모두 접기"><i class="fa-solid fa-minus"></i></button>
        </div>

        <div class="tree-container">
            <div id="jstree_demo"></div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jstree/3.3.12/jstree.min.js"></script>

<script th:inline="javascript">
    $(function() {
        var rawData = [[${treeData}]];

        $('#jstree_demo').jstree({
            'core' : {
                'data' : rawData,
                'check_callback' : true,
                'themes' : { "variant" : "large" }
            },
            'plugins' : [ "search", "wholerow", "types" ],
            'types' : {
                'default' : { 'icon' : 'fa-solid fa-folder text-warning' },
                'file' : { 'icon' : 'fa-solid fa-user text-primary' }
            }
        });

        $('#btn-open').click(function() {
            $('#jstree_demo').jstree("open_all");
        });

        $('#btn-close').click(function() {
            $('#jstree_demo').jstree("close_all");
        });

        var to = false;
        $('#search').keyup(function () {
            if(to) { clearTimeout(to); }
            to = setTimeout(function () {
                var v = $('#search').val();
                $('#jstree_demo').jstree(true).search(v);
            }, 250);
        });
    });
</script>
</body>
</html>
