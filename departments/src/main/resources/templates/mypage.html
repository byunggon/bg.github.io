<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{common/fragments :: headerFragment}"></th:block>
    <title>마이페이지</title>

    <style>

        /* [1] 전체 레이아웃 초기화 (index.html과 동일) */
        html, body {
            margin: 0 !important;
            padding: 0 !important;
            width: 100% !important;
            overflow-x: hidden;
            background-color: #f8f9fa;
            font-family: 'Pretendard', sans-serif;
        }

        /* [2] Navbar 위치 강제 고정 */
        nav.navbar {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            right: 0 !important;
            width: 100% !important;
            padding: 0 2rem !important;
            box-sizing: border-box !important;
            z-index: 2000 !important;
        }

        /* [3] 본문 컨테이너 (1000px 설정) */
        .container {
            max-width: 1000px !important;
            margin: 100px auto 40px auto !important;
            padding: 0 20px !important;
            box-sizing: border-box !important;
        }

        /* [4] 마이페이지 전용 카드 디자인 */
        .profile-card {
            background: white;
            padding: 50px 40px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            text-align: center;
        }

        .profile-header {
            margin-bottom: 40px;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            background-color: #eef2ff;
            color: #4361ee;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            margin: 0 auto 20px auto;
            border: 4px solid white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        /* 정보 리스트 스타일 */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            max-width: 600px;
            margin: 0 auto;
            text-align: left;
        }

        .info-item {
            background: #fcfcfd;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid #f1f3f5;
        }

        .info-label {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 5px;
            display: block;
        }

        .info-value {
            font-size: 1.1rem;
            font-weight: 700;
            color: #333;
        }

        .btn-edit {
            margin-top: 40px;
            padding: 12px 40px;
            background-color: #4361ee;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-edit:hover {
            background-color: #374dc7;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<nav th:replace="~{common/fragments :: navFragment}"></nav>

<div class="container">
    <div class="profile-card">
        <div class="profile-header">
            <div class="profile-avatar">
                <i class="fa-solid fa-user"></i>
            </div>
            <h2 style="margin: 0; font-size: 1.8rem; font-weight: 800;">내 프로필</h2>
            <p style="color: #666; margin-top: 10px;">로그인하신 계정의 상세 정보입니다.</p>
        </div>

        <div class="info-grid">
            <div class="info-item">
                <span class="info-label">사번</span>
                <span class="info-value" th:text="${session.loginUser.empId}">사번</span>
            </div>
            <div class="info-item">
                <span class="info-label">이름</span>
                <span class="info-value" th:text="${session.loginUser.empName}">홍길동</span>
            </div>
            <div class="info-item">
                <span class="info-label">부서</span>
                <span class="info-value" th:text="${session.loginUser.deptName}">개발팀</span>
            </div>
            <div class="info-item">
                <span class="info-label">권한</span>
                <span class="info-value" th:text="${session.loginUser.roleName}">일반 사용자</span>
            </div>
        </div>

        <button class="btn-edit" onclick="alert('정보 수정 기능은 준비 중입니다.')">
            정보 수정하기
        </button>
    </div>
</div>

</body>
</html>
