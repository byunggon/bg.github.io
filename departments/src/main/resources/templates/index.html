<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{common/fragments :: headerFragment}"></th:block>
    <title>사내 조직도 시스템</title>
    <style>
        /* index 페이지 전용 본문 간격 설정 */
        .main-content {
            padding-top: 120px; /* Navbar 높이 70px + 여백 */
            max-width: 1000px;
            margin: 0 auto;
            padding-left: 20px;
            padding-right: 20px;
            text-align: center;
        }

        .welcome-card, .login-needed {
            background: white;
            padding: 80px 40px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
        }

        .login-prompt-btn {
            display: inline-block;
            margin-top: 25px;
            padding: 14px 40px;
            background-color: #4361ee;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
        }
    </style>
</head>
<body>

<nav th:replace="~{common/fragments :: navFragment}"></nav>

<div class="main-content">
    <div th:if="${session.loginUser != null}" class="welcome-card">
        <h1 style="font-size: 2.5rem; font-weight: 800; margin-bottom: 15px;">안녕하세요!</h1>
        <p style="color:#666; font-size: 1.1rem;">상단 메뉴를 통해 원하는 기능을 선택해 주세요.</p>
    </div>

    <div th:if="${session.loginUser == null}" class="login-needed">
        <i class="fa-solid fa-lock" style="font-size: 3rem; color: #eee; margin-bottom: 20px;"></i>
        <h1 style="font-size: 2.5rem; font-weight: 800; margin-bottom: 15px;">인증이 필요합니다</h1>
        <p style="color:#666;">조직도 시스템을 이용하시려면 로그인이 필요합니다.</p>
        <a th:href="@{/login}" class="login-prompt-btn">로그인 페이지로 이동</a>
    </div>
</div>

<script th:inline="javascript">
    var message = [[${msg}]];
    if(message) alert(message);
</script>

</body>
</html>
