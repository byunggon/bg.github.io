<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <th:block th:replace="~{common/fragments :: headerFragment}"></th:block>

    <title>조직도 리스트</title>

    <style>
        /* [3] userList와 동일한 화면 레이아웃 설정 */
        html {
            overflow-y: scroll !important;
        }

        body {
            padding-top: 100px !important;
            padding-right: 0 !important;
            font-family: 'Pretendard', sans-serif;
            background-color: #f8f9fa;
            margin: 0;
        }

        .navbar {
            display: flex !important;
            flex-direction: row !important;
            flex-wrap: nowrap !important;
            align-items: center !important;
            justify-content: space-between !important;
            padding: 0 2rem !important;
            background-color: white !important;
            height: 70px !important;
            box-sizing: border-box !important;
        }

        /* [4] 컨테이너 너비를 userList와 동일하게 1100px로 통일 */
        .container {
            max-width: 1100px;
            margin: 0 auto 40px auto;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        /* 테이블 스타일 통일 */
        .table { width: 100%; border-collapse: collapse; }
        th {
            background-color: #fcfcfd;
            color: #666;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 15px;
            border-bottom: 2px solid #e9ecef;
            text-align: left;
        }
        td {
            padding: 15px;
            border-bottom: 1px solid #f1f3f5;
            vertical-align: middle;
        }

        /* 부서명 배지 스타일 (userList의 dept-label과 통일) */
        .dept-label {
            display: inline-flex; /* 공백과 배지를 가로로 정렬 */
            align-items: center;
            color: #4361ee;
            font-weight: 600;
            font-size: 0.85rem;
            background-color: transparent !important;
        }
        /* 실제 부서명 글자 배지 */
        .dept-text {
            background-color: #f0f4ff;
            color: #4361ee;
            padding: 4px 10px;
            border-radius: 4px;
            margin-left: 2px; /* 계층 기호와의 간격 */
        }

        /* 계층 기호(공백, └ 등) 스타일 */
        .dept-spacer {
            white-space: pre; /* 공백을 있는 그대로 유지 */
            color: #4361ee;
            opacity: 0.7;
        }

        /* 직원 이름 스타일 통일 */
        .emp-name {
            font-weight: 500;
            color: #333;
        }

        /* 경로 배지 스타일 통일 */
        .path-badge {
            font-size: 0.85rem;
            color: #888;
            background: #f8f9fa;
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid #eee;
        }

        tbody tr:hover { background-color: #fafbff; }

        /* rowspan이 적용된 셀의 경계선 처리 */
        .rowspan-cell {
            border-right: 1px solid #f1f3f5;
            background-color: #ffffff;
            vertical-align: top !important;
            padding-top: 20px !important;
            white-space: nowrap; /* 내용이 절대 줄바꿈되지 않도록 설정 */
        }
    </style>
</head>
<body>

<nav th:replace="~{common/fragments :: navFragment}"></nav>

<div class="container">
    <div class="header d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom">
        <h2 class="m-0" style="font-size: 1.6rem; font-weight: 700;">
            <i class="fa-solid fa-address-book me-2 text-primary"></i>창업진흥원 조직도
        </h2>
    </div>

    <div class="table-wrapper">
        <table class="table">
            <thead>
            <tr>
                <th style="width: 25%;">부서명 (계층)</th>
                <th style="width: 20%;">구성원</th>
                <th style="width: 55%;">상세 경로</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item, iterStat : ${orgList}">
                <td th:if="${iterStat.first or item.deptHier != orgList[iterStat.index - 1].deptHier}"
                    th:rowspan="${#lists.size(orgList.?[deptHier == '__${item.deptHier}__'])}"
                    class="rowspan-cell">

                    <div class="dept-label">
            <span class="dept-spacer"
                  th:with="nameIdx=${#strings.indexOf(item.deptHier, item.deptName)}"
                  th:text="${#strings.substring(item.deptHier, 0, nameIdx)}"></span>

                        <span class="dept-text" th:text="${item.deptName}">부서명</span>
                    </div>

                </td>

                <td>
                    <div th:if="${item.empName != null}" class="emp-name">
                        <i class="fa-solid fa-circle-user me-2 text-primary opacity-75"></i>
                        <span th:text="${item.empName}">이름</span>
                    </div>
                    <span th:if="${item.empName == null}" class="text-muted small italic">미배정</span>
                </td>

                <td>
                        <span class="path-badge">
                            <i class="fa-solid fa-location-arrow me-1 opacity-50"></i>
                            <span th:text="${item.fullPath}">경로</span>
                        </span>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(orgList)}">
                <td colspan="3" class="text-center py-5 text-muted">등록된 조직도 데이터가 없습니다.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
